site_name: Xai .NET Documentation
site_description: Documentation for the tryAGI .NET SDK for Xai.
site_url: https://tryagi.github.io/Xai/
repo_url: https://github.com/tryAGI/Xai
repo_name: tryAGI/Xai
edit_uri: edit/main/docs/
nav:
- Overview: index.md
- Guides:
  - Realtime Voice: guides/realtime-voice.md
  - Video Generation: guides/video-generation.md
  - Deferred Completions: guides/deferred-completions.md
  - Batch API: guides/batches.md
# EXAMPLES:START
- Examples:
  - Chat Completion: examples/chat-completion.md
  - Chat Completion Streaming: examples/chat-completion-streaming.md
  - Tool Calling: examples/tool-calling.md
  - Parallel Tool Calls: examples/parallel-tool-calls.md
  - Reasoning: examples/reasoning.md
  - Seed Determinism: examples/seed-determinism.md
  - Vision: examples/vision.md
  - Image Generation: examples/image-generation.md
  - Image Editing: examples/image-editing.md
  - Video Generation: examples/video-generation.md
  - Text to Speech: examples/text-to-speech.md
  - Responses API: examples/responses-api.md
  - Deferred Completion: examples/deferred-completion.md
  - Realtime Voice: examples/realtime-voice.md
  - Multi-Turn Conversation: examples/multi-turn-conversation.md
  - Document Search: examples/document-search.md
  - File Upload: examples/file-upload.md
  - API Key Info: examples/api-key-info.md
# EXAMPLES:END

theme:
  name: tryagi
  favicon: 'media/icon128.png'

plugins:
  - search
  - copy-to-llm

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - toc:
      permalink: ""
      slugify: !!python/name:pymdownx.slugs.uslugify
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - pymdownx.highlight:
      linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.progressbar
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: math
          class: arithmatex
          format: !!python/name:pymdownx.arithmatex.fence_mathjax_format
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.tabbed:
      alternate_style: true
